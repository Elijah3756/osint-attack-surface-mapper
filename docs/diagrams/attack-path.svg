  <text x="150" y="121" text-anchor="middle" fill="#e5e5e5" font-size="13" font-weight="600">Attacker</text>

  <line x1="150" y1="132" x2="150" y2="148" stroke="#ef4444" stroke-width="1" marker-end="url(#aR)"/>

  <rect x="36" y="152" width="80" height="26" rx="4" fill="#1e3a5f" stroke="#4a9eed" stroke-width="0.8"/>
  <text x="76" y="170" text-anchor="middle" fill="#a5d8ff" font-size="10">GitHub</text>

  <rect x="124" y="152" width="80" height="26" rx="4" fill="#1e3a5f" stroke="#4a9eed" stroke-width="0.8"/>
  <text x="164" y="170" text-anchor="middle" fill="#a5d8ff" font-size="10">Hunter</text>

  <rect x="36" y="184" width="80" height="26" rx="4" fill="#1e3a5f" stroke="#4a9eed" stroke-width="0.8"/>
  <text x="76" y="202" text-anchor="middle" fill="#a5d8ff" font-size="10">Shodan</text>

  <rect x="124" y="184" width="80" height="26" rx="4" fill="#1e3a5f" stroke="#4a9eed" stroke-width="0.8"/>
  <text x="164" y="202" text-anchor="middle" fill="#a5d8ff" font-size="10">HIBP</text>

  <text x="36" y="232" fill="#777" font-size="10">Discovers employees, emails,</text>
  <text x="36" y="244" fill="#777" font-size="10">infrastructure exposure</text>

  <!-- Arrow Recon -> Graph -->
