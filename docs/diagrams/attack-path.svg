  <line x1="440" y1="333" x2="469" y2="333" stroke="#f59e0b" stroke-width="2" marker-end="url(#aO)"/>

  <rect x="474" y="304" width="185" height="58" rx="6" fill="#2d1b69" stroke="#8b5cf6" stroke-width="1.5"/>
