  <text x="566" y="342" text-anchor="middle" fill="#999" font-size="10">(open port 3389)</text>

  <line x1="659" y1="333" x2="688" y2="333" stroke="#8b5cf6" stroke-width="2" marker-end="url(#aP)"/>

  <rect x="693" y="304" width="190" height="58" rx="6" fill="#1a4d2e" stroke="#22c55e" stroke-width="1.5"/>
  <text x="788" y="330" text-anchor="middle" fill="#e5e5e5" font-size="12" font-weight="700">4. Internal Access</text>
