  <line x1="221" y1="333" x2="250" y2="333" stroke="#ef4444" stroke-width="2" marker-end="url(#aR)"/>

  <rect x="255" y="304" width="185" height="58" rx="6" fill="#5c3d1a" stroke="#f59e0b" stroke-width="1.5"/>
