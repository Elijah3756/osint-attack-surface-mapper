  <line x1="455" y1="136" x2="480" y2="148" stroke="#555" stroke-width="1"/>
  <line x1="415" y1="180" x2="430" y2="190" stroke="#555" stroke-width="1"/>
  <line x1="475" y1="180" x2="455" y2="190" stroke="#555" stroke-width="1"/>

  <text x="330" y="240" fill="#777" font-size="10">Centrality + PageRank scoring</text>

